# PolyON Module Manifest — PP Odoo
# 이미지 내 /polyon-module/module.yaml 로 COPY

apiVersion: polyon.io/v1
kind: Module

metadata:
  id: odoo
  name: PP Odoo
  version: "0.1.0"
  category: engine
  description: "ERP/HR/비즈니스 관리 플랫폼"
  icon: Enterprise
  vendor: "Triangle.s"
  license: LGPL-3.0

spec:
  engine: odoo

  requires:
    - id: postgresql
    - id: rustfs
    - id: samba-dc
    - id: stalwart
    - id: redis

  resources:
    image: jupitertriangles/polyon-odoo:v0.1.0
    replicas: 1
    ports:
      - name: http
        containerPort: 8069
    health:
      path: /web/health
      port: 8069
      initialDelay: 60
      period: 15
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi

  # ── PRC: Platform Resource Claims (5개 자동 프로비저닝) ──
  claims:
    - type: database
      config:
        name: odoo              # → polyon_odoo DB, mod_odoo 유저
    - type: objectStorage
      config:
        bucket: odoo            # → odoo S3 버킷
    - type: directory
      config:
        ou: odoo                # → OU=odoo, svc-odoo 서비스 계정
    - type: smtp
      config:
        domain: odoo            # → SMTP 발송 계정
    - type: cache               # → Redis DB 자동 할당 (3~15)

  # ── 환경변수 템플릿 (PRC credential 주입) ──
  env:
    # Database
    DB_HOST: "{{ claims.database.host }}"
    DB_PORT: "{{ claims.database.port }}"
    DB_NAME: "{{ claims.database.database }}"
    DB_USER: "{{ claims.database.user }}"
    DB_PASSWORD: "{{ claims.database.password }}"
    # S3 Attachment (RustFS)
    AWS_HOST: "{{ claims.objectStorage.endpoint }}"
    AWS_BUCKET_NAME: "{{ claims.objectStorage.bucket }}"
    AWS_ACCESS_KEY_ID: "{{ claims.objectStorage.accessKey }}"
    AWS_SECRET_ACCESS_KEY: "{{ claims.objectStorage.secretKey }}"
    # LDAP (Samba AD DC)
    LDAP_SERVER: "{{ claims.directory.host }}"
    LDAP_PORT: "{{ claims.directory.port }}"
    LDAP_BIND_DN: "{{ claims.directory.bindDN }}"
    LDAP_BIND_PASSWORD: "{{ claims.directory.bindPassword }}"
    LDAP_BASE_DN: "{{ claims.directory.baseDN }}"
    # SMTP (Stalwart Mail)
    SMTP_HOST: "{{ claims.smtp.host }}"
    SMTP_PORT: "{{ claims.smtp.port }}"
    SMTP_USER: "{{ claims.smtp.user }}"
    SMTP_PASSWORD: "{{ claims.smtp.password }}"
    # Redis
    REDIS_URL: "{{ claims.cache.url }}"
    # Odoo 정적 설정
    ODOO_ADMIN_PASSWORD: "admin"
    ODOO_DB_FILTER: "^polyon_odoo$"
    ODOO_LIST_DB: "false"
    ODOO_PROXY_MODE: "true"
    ODOO_WORKERS: "2"

  ingress:
    subdomain: odoo
    port: 8069

  # ── Console Admin 페이지 ──
  console:
    menuGroup: services
    adminPath: /web
    pages:
      - id: backend
        title: "Odoo 관리"
        icon: Enterprise
        path: ""
        default: true

  # ── Portal 사원 페이지 ──
  portal:
    menuGroup: apps
    userPath: /web
    pages:
      - id: main
        title: "비즈니스"
        icon: Enterprise
        path: ""
        default: true

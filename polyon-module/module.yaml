# PolyON Module Manifest — PP Odoo v0.2.0
# PP 제1원칙: Keycloak SSO 인증 (LDAP 직접 인증 금지)

apiVersion: polyon.io/v1
kind: Module

metadata:
  id: odoo
  name: PP Odoo
  version: "0.2.0"
  category: engine
  description: "ERP/HR/비즈니스 관리 플랫폼"
  icon: Enterprise
  vendor: "Triangle.s"
  license: LGPL-3.0

spec:
  engine: odoo

  requires:
    - id: postgresql
    - id: rustfs

  resources:
    image: jupitertriangles/polyon-odoo:v0.2.0
    replicas: 1
    ports:
      - name: http
        containerPort: 8069
    health:
      path: /web/health
      port: 8069
      initialDelay: 60
      period: 15
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi

  # PRC Claims (4개: DB, S3, SMTP, Auth)
  claims:
    - type: database
      config:
        name: odoo
    - type: objectStorage
      config:
        bucket: odoo
    - type: smtp
      config:
        domain: odoo
    - type: auth
      config:
        clientId: odoo
        accessType: public
        redirectUris:
          - "https://odoo.{{ baseDomain }}/*"
          - "https://console.{{ baseDomain }}/modules/odoo/*"
          - "https://portal.{{ baseDomain }}/modules/odoo/*"

  env:
    # Database
    DB_HOST: "{{ claims.database.host }}"
    DB_PORT: "{{ claims.database.port }}"
    DB_NAME: "{{ claims.database.database }}"
    DB_USER: "{{ claims.database.user }}"
    DB_PASSWORD: "{{ claims.database.password }}"
    # S3 Attachment (RustFS)
    AWS_HOST: "{{ claims.objectStorage.endpoint }}"
    AWS_BUCKET_NAME: "{{ claims.objectStorage.bucket }}"
    AWS_ACCESS_KEY_ID: "{{ claims.objectStorage.accessKey }}"
    AWS_SECRET_ACCESS_KEY: "{{ claims.objectStorage.secretKey }}"
    # SMTP (Stalwart Mail)
    SMTP_HOST: "{{ claims.smtp.host }}"
    SMTP_PORT: "{{ claims.smtp.port }}"
    SMTP_USER: "{{ claims.smtp.user }}"
    SMTP_PASSWORD: "{{ claims.smtp.password }}"
    # Keycloak OIDC SSO (PP 제1원칙)
    OIDC_ISSUER: "{{ claims.auth.issuer }}"
    OIDC_CLIENT_ID: "{{ claims.auth.clientId }}"
    OIDC_AUTH_ENDPOINT: "{{ claims.auth.authEndpoint }}"
    OIDC_TOKEN_ENDPOINT: "{{ claims.auth.tokenEndpoint }}"
    OIDC_JWKS_URI: "{{ claims.auth.jwksUri }}"
    # Odoo 정적 설정
    ODOO_ADMIN_PASSWORD: "admin"
    ODOO_DB_FILTER: "^polyon_odoo$"
    ODOO_LIST_DB: "false"
    ODOO_PROXY_MODE: "true"
    ODOO_WORKERS: "2"

  ingress:
    subdomain: odoo
    port: 8069

  console:
    menuGroup: services
    adminPath: /web
    pages:
      - id: backend
        title: "Odoo 관리"
        icon: Enterprise
        path: ""
        default: true

  portal:
    menuGroup: apps
    userPath: /web
    pages:
      - id: main
        title: "비즈니스"
        icon: Enterprise
        path: ""
        default: true
